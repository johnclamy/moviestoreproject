{% extends "base.html" %}
{% block content %}
<section class="p-3">
    <div class="container">
        <div class="row mt-3">
            <div class="col mx-auto mb-3">
                <h1 class="h2">Edit Review</h1>
                <hr />
                <form method="POST">
                    {% csrf_token %}
                    <p>
                        <label for="comment">Comment:</label>
                        <textarea name="comment" required rows="5" class="form-control" id="comment">
                            {{ template_data.review.comment }}
                        </textarea>
                    </p>
                    <button type="submit" class="btn btn-dark">Edit Review</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
