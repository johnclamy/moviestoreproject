{% extends "base.html" %}
{% block content %}
    <div class="p-3 mt-4">
        <div class="container">
            <div class="row justify-content-center">
                <section class="col-md-8">
                    <div class="card shadow p-3 mb-4 rounded">
                        <div class="card-body">
                            <header>
                                <h1 class="card-title">Login</h1>
                                <hr />
                            </header>
                            {% if template_data.error %}
                            <section>
                                <p class="alert alert-danger" role="alert">
                                    {{ template_data.error }}
                                </p>
                            </section>
                            {% endif %}
                            <form method="POST">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label for="username" class="form-label">Username</label>
                                    <input type="text" class="form-control" name="username" id="username" autocomplete="username" required>
                                </div>
                                <div class="mb-3">
                                    <label for="password" class="form-label">Password</label>
                                    <input type="password" class="form-control" name="password" id="password" autocomplete="current-password" required>
                                </div>
                                <div class="text-center">
                                    <button type="submit" class="btn bg-dark text-white">Login</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </div>
{% endblock content %}
