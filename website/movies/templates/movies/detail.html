{% extends "base.html" %}
{% block content %}
{% load static %}
<article class="container px-3 px-lg-4 my-5">
    <section class="row gx-4 gx-lg-5 align-items-center">
        <div class="col-md-6">
            <img class="card-img-top mb-5 mb-md-0 rounded" src="https://dummyimage.com/600x700/dee2e6/6c757d.jpg" alt="..." />
        </div>
        <div class="col-md-6">
            <div class="small mb-1">{{ template_data.movie.rating }}</div>
            <h1 class="display-5 fw-bolder">{{ template_data.movie.name }}</h1>
            <div class="fs-5 mb-5">
                <span>£{{ template_data.movie.price }}</span>
            </div>
            <p class="lead">{{ template_data.movie.description}}</p>
            <div class="d-flex">
                <input class="form-control text-center me-3" id="inputQuantity" type="num" value="1" style="max-width: 3rem" />
                <button class="btn btn-warning flex-shrink-0" type="button">
                    <i class="fa-solid fa-cart-shopping"></i>&nbsp;
                    Add to cart
                </button>
            </div>
        </div>
    </section>
</article>

{% endblock content %}
